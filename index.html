<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Telmo Runner</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#7b3ff2,#4a148c);
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#player{
position:absolute;
bottom:120px;
left:120px;
width:90px;
z-index:3;
}

#ground{
position:absolute;
bottom:0;
width:200%;
height:120px;
background:repeating-linear-gradient(
90deg,#333 0,#333 40px,#444 40px,#444 80px);
animation:ground 2s linear infinite;
}

@keyframes ground{
from{background-position-x:0}
to{background-position-x:-80px}
}

.obstacle{
position:absolute;
bottom:120px;
font-size:50px;
}

.coin{
position:absolute;
width:35px;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:5;
}

#record{
position:absolute;
top:10px;
right:20px;
color:white;
z-index:5;
}

#jumpBtn{
position:absolute;
right:20px;
bottom:150px;
font-size:40px;
background:#ffffff50;
padding:20px;
border-radius:50%;
z-index:5;
}

#shopBtn{
position:absolute;
top:60px;
right:20px;
z-index:5;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:10;
}

.character{
display:inline-block;
margin:20px;
cursor:pointer;
}

.character img{
width:120px;
}

#shop{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:#000000ee;

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:9999;

color:white;

}

.skin{
margin:10px;
padding:15px;
background:#ffffff20;
cursor:pointer;
border-radius:10px;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:rgba(0,0,0,0.7);
padding:30px;
color:white;
border-radius:10px;
z-index:100;
}

#gameover.show{
transform:translate(-50%,-50%) scale(1);
}

</style>

</head>

<body>

<div id="game">

<div id="ground"></div>

<img id="player">

<div id="hud">
Score: <span id="score">0</span><br>
Moedas: <span id="coins">0</span>
</div>

<div id="record">
Recorde: <span id="bestScore">0</span>
</div>

<div id="jumpBtn">⬆️</div>

<button id="shopBtn" onclick="openShop()">🛒 Loja</button>

<div id="menu">

<h1>Escolha o personagem</h1>

<div class="character" onclick="selectPlayer('telmo')">
<img src="TELMO_NORMAL.png">
<p>Telmo</p>
</div>

</div>

<div id="shop">

<h1>Loja de Skins</h1>

<div class="skin" onclick="selectPlayer('telmo')">
Telmo Normal
</div>

<div class="skin" onclick="selectPlayer('halloween')">
Telmo Halloween
</div>

<div class="skin" onclick="selectPlayer('ferias')">
Telmo Férias
</div>

<div class="skin" onclick="selectPlayer('logo')">
Logo
</div>

<button onclick="closeShop()">Fechar</button>

</div>

<div id="gameover">

<h1>GAME OVER</h1>

<p>Score: <span id="finalScore"></span></p>

<button onclick="location.reload()">Jogar novamente</button>

</div>

</div>

<script>

let player=document.getElementById("player")

let jumping=false
let velocity=0
let gravity=1.2

let speed=6
let score=0
let coins=0

let obstacles=[]
let coinList=[]

let playing=false

let bestScore=localStorage.getItem("recordTelmo")||0
document.getElementById("bestScore").innerText=bestScore

function selectPlayer(type){

if(type=="telmo")
player.src="TELMO_NORMAL.png"

if(type=="halloween")
player.src="TELMO_HALLOWEEN.png"

if(type=="ferias")
player.src="TELMO_FERIAS.png"

if(type=="logo")
player.src="LOGO.png"

document.getElementById("menu").style.display="none"

closeShop()

startGame()

}

function startGame(){

playing=true

spawnObstacle()

spawnCoin()

setInterval(()=>{

if(!playing)return

score+=10
speed+=0.2

document.getElementById("score").innerText=score

},1000)

gameLoop()

}

function spawnObstacle(){

setInterval(()=>{

if(!playing)return

let o=document.createElement("div")

o.className="obstacle"

o.innerText="🧾"

o.style.left=window.innerWidth+"px"

game.appendChild(o)

obstacles.push(o)

},2000)

}

function spawnCoin(){

setInterval(()=>{

if(!playing)return

let c=document.createElement("img")

c.src="https://cdn-icons-png.flaticon.com/512/138/138292.png"

c.className="coin"

c.style.left=window.innerWidth+"px"
c.style.bottom=(170+Math.random()*120)+"px"

game.appendChild(c)

coinList.push(c)

},2500)

}

function jump(){

if(jumping)return

jumping=true

velocity=20

}

function collision(a,b){

let aRect=a.getBoundingClientRect()
let bRect=b.getBoundingClientRect()

return !(

aRect.right<bRect.left||
aRect.left>bRect.right||
aRect.bottom<bRect.top||
aRect.top>bRect.bottom

)

}

function gameLoop(){

if(!playing)return

if(jumping){

velocity-=gravity

let bottom=parseInt(player.style.bottom||120)

bottom+=velocity

if(bottom<=120){

bottom=120
jumping=false

}

player.style.bottom=bottom+"px"

}

obstacles.forEach((o,i)=>{

o.style.left=(o.offsetLeft-speed)+"px"

if(o.offsetLeft<-100){

o.remove()
obstacles.splice(i,1)

}

if(collision(player,o)){

gameOver()

}

})

coinList.forEach((c,i)=>{

c.style.left=(c.offsetLeft-speed)+"px"

if(collision(player,c)){

coins++

document.getElementById("coins").innerText=coins

c.remove()
coinList.splice(i,1)

}

})

requestAnimationFrame(gameLoop)

}

function gameOver(){

playing=false

document.getElementById("finalScore").innerText=score

if(score>bestScore){

bestScore=score
localStorage.setItem("recordTelmo",bestScore)

}

document.getElementById("bestScore").innerText=bestScore

document.getElementById("gameover").classList.add("show")

}

document.addEventListener("keydown",e=>{

if(e.code=="Space"||e.key=="ArrowUp")
jump()

})

document.getElementById("jumpBtn").addEventListener("touchstart",jump)

function openShop(){

document.getElementById("shop").style.display="flex"

}

function closeShop(){

document.getElementById("shop").style.display="none"

}

</script>

</body>
</html>
