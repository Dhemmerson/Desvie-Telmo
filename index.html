<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Desvie dos Problemas</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#6a0dad;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#player{
position:absolute;
bottom:60px;
width:80px;
left:50%;
transform:translateX(-50%);
}

.obstacle{
position:absolute;
width:70px;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

#menu img{
width:120px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

#menu img:hover{
transform:scale(1.1);
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
display:none;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

.explosion{
position:absolute;
width:120px;
pointer-events:none;
animation:boom 0.6s forwards;
}

@keyframes boom{
0%{transform:scale(0)}
100%{transform:scale(1.8);opacity:0}
}

</style>
</head>

<body>

<div id="game">

<img id="player">

<div id="hud">
⏱ Tempo: <span id="time">0</span><br>
🏆 Score: <span id="score">0</span><br>
🥇 Recorde: <span id="record">0</span>
</div>

<div id="menu">

<h1>Escolha o Personagem</h1>

<img onclick="selectPlayer('telmo')" src="https://i.postimg.cc/ZKG0RzJ2/original-viko-(27).png">
<div>Telmo</div>

<img onclick="selectPlayer('logo')" src="https://i.postimg.cc/xj71xVNq/original-viko-(29).png">
<div>Logo</div>

</div>

<div id="gameover">

<h1>GAME OVER</h1>

<p>Score: <span id="finalScore"></span></p>
<p>Última rodada: <span id="lastScore"></span></p>

<button onclick="restart()">Jogar novamente</button>

</div>

</div>

<script>

let game=document.getElementById("game")
let player=document.getElementById("player")

let score=0
let time=0
let record=localStorage.getItem("record")||0
let lastScore=0

let speed=3
let obstacles=[]
let playing=false
let playerX=window.innerWidth/2

let colors=["#6a0dad","#2ecc71","#ff8c00","#87cefa"]

document.getElementById("record").innerText=record

function selectPlayer(p){

document.getElementById("menu").style.display="none"

if(p=="telmo"){
player.src="https://i.postimg.cc/ZKG0RzJ2/original-viko-(27).png"
}

if(p=="logo"){
player.src="https://i.postimg.cc/xj71xVNq/original-viko-(29).png"
}

playerX = window.innerWidth/2
player.style.left = playerX + "px"

startGame()

}

function startGame(){

playing=true
score=0
time=0
speed=3
obstacles=[]

spawnObstacle()

setInterval(()=>{

if(!playing)return

time++
score+=5

document.getElementById("time").innerText=time
document.getElementById("score").innerText=score

if(score%70==0){
spawnObstacle()
speed+=0.5
}

if(score%120==0){
document.body.style.background=
colors[Math.floor(Math.random()*colors.length)]
}

},1000)

gameLoop()

}

function spawnObstacle(){

setInterval(()=>{

if(!playing)return

let imgs=[
"https://i.postimg.cc/ZKSq3t9Q/2.png",
"https://i.postimg.cc/DzHG3jxC/5.png",
"https://i.postimg.cc/tgKbjWWK/4.png",
"https://i.postimg.cc/vHtZtq9J/3.png"
]

let o=document.createElement("img")
o.src=imgs[Math.floor(Math.random()*imgs.length)]
o.className="obstacle"

o.style.left=Math.random()*(window.innerWidth-80)+"px"
o.style.top="-80px"

game.appendChild(o)
obstacles.push(o)

},1200)

}

function gameLoop(){

if(!playing)return

obstacles.forEach((o,i)=>{

let top=o.offsetTop+speed
o.style.top=top+"px"

if(top>window.innerHeight){
o.remove()
obstacles.splice(i,1)
}

let rect1=player.getBoundingClientRect()
let rect2=o.getBoundingClientRect()

if(
rect1.left<rect2.right &&
rect1.right>rect2.left &&
rect1.top<rect2.bottom &&
rect1.bottom>rect2.top
){

explode()
gameOver()

}

})

requestAnimationFrame(gameLoop)

}

function explode(){

let boom=document.createElement("img")
boom.src="https://cdn-icons-png.flaticon.com/512/463/463612.png"
boom.className="explosion"

boom.style.left=player.offsetLeft+"px"
boom.style.top=player.offsetTop+"px"

game.appendChild(boom)

setTimeout(()=>boom.remove(),600)

}

function gameOver(){

playing=false
lastScore=score

if(score>record){
record=score
localStorage.setItem("record",record)
}

document.getElementById("finalScore").innerText=score
document.getElementById("lastScore").innerText=lastScore

document.getElementById("gameover").style.display="block"

}

function restart(){

document.getElementById("gameover").style.display="none"
document.getElementById("menu").style.display="block"

obstacles.forEach(o=>o.remove())
obstacles=[]

}

document.addEventListener("keydown",e=>{

if(!playing)return

let playerWidth = player.offsetWidth

if(e.key=="ArrowLeft"){
playerX -= 40
}

if(e.key=="ArrowRight"){
playerX += 40
}

let min = 0
let max = window.innerWidth - playerWidth

playerX = Math.max(min, Math.min(max, playerX))

player.style.left = playerX + "px"

})

game.addEventListener("touchmove",e=>{

let touch = e.touches[0]

let playerWidth = player.offsetWidth

playerX = touch.clientX - (playerWidth/2)

let min = 0
let max = window.innerWidth - playerWidth

playerX = Math.max(min, Math.min(max, playerX))

player.style.left = playerX + "px"

})

</script>

</body>
</html>
