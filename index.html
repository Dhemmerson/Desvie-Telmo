<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Desvie dos Problemas</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
background:#7b00ff;
transition:background 1s;
}

#game{
display:none;
position:relative;
width:100vw;
height:100vh;
}

#player{
position:absolute;
bottom:60px;
width:80px;
transition:transform .2s,left .2s;
}

.obstacle{
position:absolute;
width:60px;
}

#score,#record{
position:absolute;
top:20px;
font-size:20px;
}

#score{left:20px}
#record{right:20px}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.characterBox{
display:inline-block;
margin:25px;
cursor:pointer;
transition:.3s;
}

.characterBox:hover{
transform:scale(1.1) rotate(3deg);
}

.character{
width:120px;
display:block;
}

.characterName{
margin-top:8px;
font-weight:bold;
}

#lastScore{
margin-top:20px;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

.explosion{
position:absolute;
font-size:90px;
animation:boom .6s forwards;
}

@keyframes boom{
0%{transform:scale(1);opacity:1}
100%{transform:scale(3);opacity:0}
}

</style>
</head>

<body>

<div id="menu">

<h1>Escolha seu personagem</h1>

<div class="characterBox" onclick="startGame('https://i.postimg.cc/ZKG0RzJ2/original-viko-(27).png')">
<img class="character" src="https://i.postimg.cc/ZKG0RzJ2/original-viko-(27).png">
<div class="characterName">TELMO</div>
</div>

<div class="characterBox" onclick="startGame('https://i.postimg.cc/xj71xVNq/original-viko-(29).png')">
<img class="character" src="https://i.postimg.cc/xj71xVNq/original-viko-(29).png">
<div class="characterName">LOGO</div>
</div>

<div id="lastScore"></div>

</div>

<div id="game">

<div id="score">Score: 0</div>
<div id="record">Recorde: 0</div>

<img id="player">

<div id="gameover">

<h1>GAME OVER</h1>

<div id="finalScore"></div>

<br>

<button onclick="restart()">Jogar novamente</button>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b5c9c02bb.mp3">
</audio>

<script>

let player=document.getElementById("player")
let menu=document.getElementById("menu")
let game=document.getElementById("game")
let scoreEl=document.getElementById("score")
let recordEl=document.getElementById("record")
let music=document.getElementById("music")

let playerX
let obstacles=[]
let score=0
let speed=4
let playing=false

let record=localStorage.getItem("record")||0
recordEl.innerHTML="Recorde: "+record

let lastScore=localStorage.getItem("lastScore")||0

if(lastScore>0){
document.getElementById("lastScore").innerHTML="Última rodada: "+lastScore
}

let obstacleImages=[
"https://i.postimg.cc/ZKSq3t9Q/2.png",
"https://i.postimg.cc/DzHG3jxC/5.png",
"https://i.postimg.cc/tgKbjWWK/4.png",
"https://i.postimg.cc/vHtZtq9J/3.png"
]

function startGame(img){

menu.style.display="none"
game.style.display="block"

player.src=img

playerX=window.innerWidth/2
player.style.left=playerX+"px"

score=0
speed=4
playing=true

music.play()

spawnLoop=setInterval(spawnObstacle,900)
gameLoop=setInterval(update,20)

scoreLoop=setInterval(()=>{

if(!playing)return

score+=10
speed+=0.25

scoreEl.innerHTML="Score: "+score

if(score>record){
record=score
localStorage.setItem("record",record)
recordEl.innerHTML="Recorde: "+record
}

changeBackground()

},1000)

}

function spawnObstacle(){

let obs=document.createElement("img")

obs.src=obstacleImages[Math.floor(Math.random()*3)]

obs.className="obstacle"

obs.style.left=Math.random()*window.innerWidth+"px"

obs.style.top="-80px"

game.appendChild(obs)

obstacles.push(obs)

}

function update(){

obstacles.forEach((obs,i)=>{

let top=parseInt(obs.style.top)

obs.style.top=(top+speed)+"px"

let playerRect=player.getBoundingClientRect()
let obsRect=obs.getBoundingClientRect()

if(
playerRect.left<obsRect.right &&
playerRect.right>obsRect.left &&
playerRect.top<obsRect.bottom &&
playerRect.bottom>obsRect.top
){
explode()
endGame()
}

if(top>window.innerHeight){
obs.remove()
obstacles.splice(i,1)
}

})

}

function explode(){

let boom=document.createElement("div")

boom.innerHTML="💥"

boom.className="explosion"

boom.style.left=player.style.left
boom.style.bottom="60px"

game.appendChild(boom)

setTimeout(()=>boom.remove(),600)

}

function endGame(){

playing=false

clearInterval(spawnLoop)
clearInterval(gameLoop)
clearInterval(scoreLoop)

music.pause()

localStorage.setItem("lastScore",score)

document.getElementById("finalScore").innerHTML="Pontuação: "+score

document.getElementById("gameover").style.display="block"

}

function restart(){

game.style.display="none"
document.getElementById("gameover").style.display="none"
menu.style.display="block"

lastScore=localStorage.getItem("lastScore")

document.getElementById("lastScore").innerHTML="Última rodada: "+lastScore+"<br>Tente bater o recorde!"

}

document.addEventListener("keydown",(e)=>{

if(!playing)return

if(e.key=="ArrowLeft"||e.key=="a")playerX-=40
if(e.key=="ArrowRight"||e.key=="d")playerX+=40

player.style.left=playerX+"px"

})

let startX=0

document.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX

})

document.addEventListener("touchmove",(e)=>{

if(!playing)return

let moveX=e.touches[0].clientX

playerX=moveX

player.style.left=playerX+"px"

})

let colors=[
"#7b00ff",
"#00c853",
"#ff6d00",
"#40c4ff"
]

function changeBackground(){

let color=colors[Math.floor(Math.random()*colors.length)]

document.body.style.background=color

}

</script>

</body>
</html>
